<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Nexorie favicon</title>
  <desc id="desc">Rounded square icon with a stylized N in blue and violet gradients.</desc>
  <defs>
    <linearGradient id="bg" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3f477d" />
      <stop offset="1" stop-color="#171b33" />
    </linearGradient>
    <linearGradient id="glyphLeft" x1="15" y1="18" x2="28" y2="43" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b7c7ff" />
